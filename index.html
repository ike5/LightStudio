<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LightStudio</title>
    <style>
      :root {
        --bg: #15171c;
        --panel: #1d2027;
        --panel-2: #262a33;
        --line: #333845;
        --text: #e7e9ee;
        --muted: #9aa1b1;
        --accent: #6ea8fe;
        --accent-2: #ffd166;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      #app { display: flex; height: 100vh; overflow: hidden; }

      #sidebar {
        width: 300px;
        flex: 0 0 300px;
        background: var(--panel);
        border-right: 1px solid var(--line);
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      #sidebar h1 {
        font-size: 18px;
        margin: 0;
        letter-spacing: 0.5px;
      }
      #sidebar h1 span { color: var(--accent-2); }
      .hint { color: var(--muted); font-size: 12px; margin: -8px 0 0; }

      section.card {
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
      }
      section.card h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--muted);
        margin: 0 0 10px;
      }

      button {
        font: inherit;
        color: var(--text);
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 10px;
        cursor: pointer;
      }
      button:hover { border-color: var(--accent); }
      button.primary { background: var(--accent); color: #0b1220; border-color: var(--accent); font-weight: 600; }
      button.toggle.active { background: var(--accent-2); color: #1a1500; border-color: var(--accent-2); }
      button:disabled { opacity: 0.45; cursor: not-allowed; }

      input[type="file"] { width: 100%; color: var(--muted); }

      .row { display: flex; align-items: center; gap: 8px; }
      .row + .row { margin-top: 9px; }
      .row label { flex: 0 0 92px; color: var(--muted); }
      .row input[type="range"] { flex: 1; }
      .row .val { flex: 0 0 38px; text-align: right; font-variant-numeric: tabular-nums; color: var(--text); }

      /* Layers list */
      #layer-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
      .layer-item {
        display: flex; align-items: center; gap: 8px;
        padding: 7px 8px; border-radius: 6px; cursor: pointer;
        border: 1px solid transparent; background: var(--panel);
      }
      .layer-item.active { border-color: var(--accent); background: #20283a; }
      .layer-swatch { width: 14px; height: 14px; border-radius: 50%; flex: 0 0 14px; box-shadow: 0 0 6px rgba(255,255,255,0.3); }
      .layer-name { flex: 1; }
      .layer-del { background: transparent; border: none; color: var(--muted); padding: 2px 6px; }
      .layer-del:hover { color: #ff8080; }
      .layers-actions { display: flex; gap: 8px; }

      .seg { display: flex; gap: 6px; flex-wrap: wrap; }
      .seg button { flex: 1; }

      /* Stage */
      #stage {
        flex: 1; position: relative;
        display: flex; align-items: center; justify-content: center;
        padding: 24px; min-width: 0;
      }
      #prompt {
        color: var(--muted); text-align: center; font-size: 15px;
        border: 2px dashed var(--line); border-radius: 12px; padding: 48px 64px;
      }
      #canvas-wrap { position: relative; line-height: 0; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
      #gl { display: block; max-width: 100%; max-height: calc(100vh - 48px); }

      #overlay { position: absolute; inset: 0; }
      #overlay:not(.editing) { pointer-events: none; }
      #overlay.editing { pointer-events: auto; cursor: crosshair; }

      .orb {
        position: absolute; width: 26px; height: 26px; margin: -13px 0 0 -13px;
        border-radius: 50%; pointer-events: auto; cursor: grab; touch-action: none;
        background: radial-gradient(circle at 35% 35%, #fff, rgba(255,255,255,0.15) 60%, transparent 72%);
        border: 2px solid rgba(255,255,255,0.85);
        box-shadow: 0 0 14px 4px var(--orb-glow, rgba(255,255,255,0.6));
      }
      .orb.active { width: 30px; height: 30px; margin: -15px 0 0 -15px; border-color: var(--accent-2); }
      #overlay.editing .orb { pointer-events: none; opacity: 0.35; }
    </style>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <h1>Light<span>Studio</span></h1>
        <p class="hint">Drag the glowing orbs to move each light. Paint a mask to relight only part of the photo.</p>

        <input type="file" id="file" accept="image/*" />

        <section class="card" id="layers-card">
          <h2>Lights</h2>
          <div id="layer-list"></div>
          <div class="layers-actions">
            <button id="add-layer">+ Add light</button>
            <button id="edit-mask" class="toggle">Edit mask</button>
          </div>
        </section>

        <section class="card" id="mask-card" style="display:none">
          <h2>Mask — region for the active light</h2>
          <p class="hint" style="margin:0 0 10px">White = lit, black = untouched. Clear, then paint or lasso the area you want lit.</p>
          <div class="seg" style="margin-bottom:9px">
            <button id="mask-brush" class="toggle active">Brush</button>
            <button id="mask-lasso" class="toggle">Lasso</button>
            <button id="mask-add" class="toggle active">Add</button>
            <button id="mask-erase" class="toggle">Erase</button>
          </div>
          <div class="row"><label>Brush size</label><input id="mask-size" type="range" min="4" max="400" step="1" value="80" /><span class="val" id="mask-size-v"></span></div>
          <div class="row"><label>Feather</label><input id="mask-feather" type="range" min="0" max="60" step="1" value="12" /><span class="val" id="mask-feather-v"></span></div>
          <div class="seg" style="margin-top:10px">
            <button id="mask-fill">Fill all</button>
            <button id="mask-clear">Clear</button>
            <button id="mask-invert">Invert</button>
          </div>
        </section>

        <section class="card" id="controls-card">
          <h2>Light settings</h2>
          <div id="controls"></div>
        </section>

        <button id="export" class="primary" disabled>Download PNG</button>
      </aside>

      <main id="stage">
        <div id="prompt">Upload a photo to begin</div>
        <div id="canvas-wrap">
          <canvas id="gl"></canvas>
          <div id="overlay"></div>
        </div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
